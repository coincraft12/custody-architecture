spring:
  application:
    name: custody
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  flyway:
    enabled: false
    locations: classpath:db/migration/h2
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

policy:
  max-amount: 0.1
  whitelist-to-addresses: 0x70997970c51812dc3a010c7d01b50e0d17dc79c8,0x3c44cdddb6a900fa2b585dd299e03d12fa4293bc,0x1111111111111111111111111111111111111111,0x78513e370210539be82D08486987f76f63673B88

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
  info:
    build:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  # 8-2-3: Micrometer Tracing — 기본 샘플링 비율 (개발: 1.0, 운영: 0.1 권장)
  tracing:
    enabled: ${CUSTODY_TRACING_ENABLED:false}
    sampling:
      probability: ${CUSTODY_TRACING_SAMPLING_PROBABILITY:1.0}

info:
  app:
    name: ${spring.application.name}
    version: "@project.version@"

# 13-1-5: Swagger UI — enabled in dev, disabled in production via application-production.yaml
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

resilience4j:
  # 4-1: Circuit Breaker — 실패율 50% 초과, 슬라이딩 윈도우 10, 대기 30s
  circuitbreaker:
    instances:
      evmRpc:
        failure-rate-threshold: 50
        sliding-window-size: 10
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
        register-health-indicator: true
  # 4-2: Retry — broadcast() 제외, 최대 3회, 지수 백오프 1s/2s/4s
  retry:
    instances:
      evmRpcRetry:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2.0
        retry-exceptions:
          - java.io.IOException
          - java.lang.IllegalStateException
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - lab.custody.adapter.BroadcastRejectedException

logging:
  level:
    com.zaxxer.hikari.pool.HikariPool: ERROR

custody:
  security:
    api-keys:
      - key: dev-operator-key
        roles: [OPERATOR]
      - key: dev-approver-key
        roles: [APPROVER, OPERATOR]
      - key: dev-admin-key
        roles: [ADMIN, APPROVER, OPERATOR]
  chain:
    mode: ${CUSTODY_CHAIN_MODE:mock}
  confirmation-tracker:
    auto-start: ${CUSTODY_CONFIRMATION_TRACKER_AUTO_START:false}
    # 5-1: 설정 외부화 — 환경변수 오버라이드 가능
    max-tries: ${CUSTODY_CONFIRMATION_TRACKER_MAX_TRIES:60}
    poll-interval-ms: ${CUSTODY_CONFIRMATION_TRACKER_POLL_INTERVAL_MS:2000}
    # 5-2: 확정 블록 수 — 0이면 receipt 수신 즉시 W8로 전이 (mock/dev 기본값)
    # Ethereum mainnet=64, Sepolia=3
    finalization-block-count: ${CUSTODY_CONFIRMATION_TRACKER_FINALIZATION_BLOCK_COUNT:0}
    finalization-timeout-minutes: ${CUSTODY_CONFIRMATION_TRACKER_FINALIZATION_TIMEOUT_MINUTES:30}
  # 12-2-1: 체인별 확정 블록 수 설정 (ChainType별 독립 오버라이드)
  # EVM: Ethereum mainnet=64, Sepolia=3 / BFT: 즉시 확정(0)
  chain-finalization:
    evm: ${CUSTODY_CHAIN_FINALIZATION_EVM:0}
    bft: ${CUSTODY_CHAIN_FINALIZATION_BFT:0}
  # 12-2-2: 체인 타입별 어댑터 Bean 이름 오버라이드 (비워두면 자동 매핑 사용)
  # 예시: custody.chain-adapter.evm=evmRpcAdapter (RPC 모드 강제)
  #       custody.chain-adapter.bft=bftMockAdapter (Mock 모드 강제)
  chain-adapter:
    evm: ${CUSTODY_CHAIN_ADAPTER_EVM:}
    bft: ${CUSTODY_CHAIN_ADAPTER_BFT:}
  whitelist:
    default-hold-hours: ${CUSTODY_WHITELIST_HOLD_HOURS:48}
    scheduler-delay-ms: ${CUSTODY_WHITELIST_SCHEDULER_DELAY_MS:60000}
  nonce:
    expiry-minutes: ${CUSTODY_NONCE_EXPIRY_MINUTES:10}
  rate-limit:
    enabled: ${CUSTODY_RATE_LIMIT_ENABLED:true}
    withdrawals-per-second: ${CUSTODY_RATE_LIMIT_WITHDRAWALS_PER_SECOND:10}
    whitelist-per-second: ${CUSTODY_RATE_LIMIT_WHITELIST_PER_SECOND:20}
  # 10-2-1: 승인 워크플로 설정
  approval:
    # false(기본): 자동 승인 (기존 동작 유지). true: 금액 기반 승인 워크플로 활성화
    enabled: ${CUSTODY_APPROVAL_ENABLED:false}
    # 이 금액(ETH) 미만: 자동 승인
    low-risk-threshold-eth: ${CUSTODY_APPROVAL_LOW_RISK_THRESHOLD_ETH:0.5}
    # 이 금액(ETH) 이상: 4-eyes (2인 승인)
    high-risk-threshold-eth: ${CUSTODY_APPROVAL_HIGH_RISK_THRESHOLD_ETH:1.0}
    # 승인 태스크 만료 시간 (시간)
    expiry-hours: ${CUSTODY_APPROVAL_EXPIRY_HOURS:24}
  # 5-4-2: Mock 어댑터 자동 확인 지연 시간 (ms). 0 = 비활성 (기본값).
  # 0보다 큰 값이면 broadcast 후 해당 시간(ms) 지연 뒤 ConfirmationTracker를 통해 자동으로
  # W7_INCLUDED → W8_SAFE_FINALIZED → W10_COMPLETED 전이를 수행한다.
  # 통합 테스트 자동화에 유용하며, 운영 환경에서는 반드시 0으로 유지해야 한다.
  mock:
    auto-confirm-delay-ms: ${CUSTODY_MOCK_AUTO_CONFIRM_DELAY_MS:0}
  bitcoin:
    enabled: ${CUSTODY_BITCOIN_ENABLED:false}
    network: ${CUSTODY_BITCOIN_NETWORK:regtest}
    rpc-url: ${CUSTODY_BITCOIN_RPC_URL:http://localhost:18443}
    rpc-user: ${CUSTODY_BITCOIN_RPC_USER:bitcoin}
    rpc-password: ${CUSTODY_BITCOIN_RPC_PASSWORD:bitcoin}
    utxo-lock-minutes: ${CUSTODY_BITCOIN_UTXO_LOCK_MINUTES:10}
    # private-key: set via CUSTODY_BITCOIN_PRIVATE_KEY env var (WIF format)
    private-key: ${CUSTODY_BITCOIN_PRIVATE_KEY:}
  evm:
    rpc-url: ${CUSTODY_EVM_RPC_URL:https://ethereum-sepolia-rpc.publicnode.com}
    # 4-3-1: 폴백 RPC URL 목록 (쉼표 구분, 빈 값이면 단일 프로바이더)
    fallback-rpc-urls: ${CUSTODY_EVM_FALLBACK_RPC_URLS:}
    chain-id: ${CUSTODY_EVM_CHAIN_ID:11155111}
    private-key: ${CUSTODY_EVM_PRIVATE_KEY:}
    # 4-4-1/4-4-2: OkHttp 커넥션/읽기 타임아웃 (4-4-4: 환경변수 오버라이드 가능)
    connect-timeout-seconds: ${CUSTODY_EVM_CONNECT_TIMEOUT_SECONDS:30}
    read-timeout-seconds: ${CUSTODY_EVM_READ_TIMEOUT_SECONDS:30}
    # 11-2-2: fee bump percentage for replace (EIP-1559 minimum: +10%)
    fee-bump-percentage: ${CUSTODY_EVM_FEE_BUMP_PERCENTAGE:110}
    # 11-2-3: 네트워크 혼잡도 기반 동적 fee bump 비율
    # LOW: baseFee < 10Gwei 또는 priorityFee/baseFee < 0.1
    # MEDIUM: 0.1 ≤ ratio < 0.5
    # HIGH: ratio ≥ 0.5
    fee-bump-low-percentage: ${CUSTODY_EVM_FEE_BUMP_LOW_PERCENTAGE:110}
    fee-bump-medium-percentage: ${CUSTODY_EVM_FEE_BUMP_MEDIUM_PERCENTAGE:120}
    fee-bump-high-percentage: ${CUSTODY_EVM_FEE_BUMP_HIGH_PERCENTAGE:130}
    # 15-1-1: MEV protection — set CUSTODY_EVM_RPC_URL to Flashbots Protect endpoint to enable
    # Flashbots: https://rpc.flashbots.net (mainnet), https://rpc-sepolia.flashbots.net (Sepolia)
    # Leave as-is for standard mempool. Override via env var without code changes.

# 15-2-1: HSM / KMS signer abstraction — see Signer.java Phase 3 plan comments
# Future: CUSTODY_SIGNER_TYPE: kms | vault | local (default: local)

# 15-3-1: Redis distributed lock — Phase 3 (see NonceAllocator for current DB-based SELECT FOR UPDATE approach)
# Future: CUSTODY_REDIS_URL: redis://localhost:6379

# 16-1-4: PDS integration feature flags (all disabled until Phase 2)
pds:
  enabled: ${PDS_ENABLED:false}
  endpoint: ${PDS_ENDPOINT:http://pds-core:3100}
  features:
    signer-key-pds: ${PDS_FEATURE_SIGNER_KEY:false}
    policy-audit-chain: ${PDS_FEATURE_AUDIT_CHAIN:false}
    emergency-access: ${PDS_FEATURE_EMERGENCY_ACCESS:false}
    proxy:
      enabled: ${CUSTODY_EVM_PROXY_ENABLED:false}
      host: ${CUSTODY_EVM_PROXY_HOST:}
      port: ${CUSTODY_EVM_PROXY_PORT:8080}
      username: ${CUSTODY_EVM_PROXY_USERNAME:}
      password: ${CUSTODY_EVM_PROXY_PASSWORD:}
