spring:
  datasource:
    url: ${CUSTODY_DB_URL:jdbc:postgresql://localhost:5432/custody}
    driver-class-name: org.postgresql.Driver
    username: ${CUSTODY_DB_USERNAME:custody}
    password: ${CUSTODY_DB_PASSWORD:custody}
    # 7-3: HikariCP 커넥션 풀 설정
    hikari:
      # 7-3-1: 최대 풀 크기 — CPU 코어 수 × 2 + 유효 스핀들 수 (PostgreSQL 권장 공식)
      # 운영 환경 기본값 10; 환경변수 오버라이드 가능
      maximum-pool-size: ${CUSTODY_DB_POOL_MAX_SIZE:10}
      # 7-3-2: 최소 유휴 커넥션 — 트래픽 급증 대비 최소 커넥션 유지
      minimum-idle: ${CUSTODY_DB_POOL_MIN_IDLE:3}
      # 7-3-3: 커넥션 유휴 타임아웃 (30분) — DB 서버 idle timeout보다 짧게 설정
      idle-timeout: ${CUSTODY_DB_POOL_IDLE_TIMEOUT_MS:1800000}
      # 7-3-4: 커넥션 최대 수명 (30분) — 인프라/방화벽 timeout 이전에 갱신
      max-lifetime: ${CUSTODY_DB_POOL_MAX_LIFETIME_MS:1800000}
      # 7-3-5: 커넥션 획득 타임아웃 — 풀 포화 시 대기 최대 시간 (30초)
      connection-timeout: ${CUSTODY_DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      # 7-3-6: keepalive — 장기 유휴 커넥션이 방화벽에 의해 끊기는 것 방지 (5분)
      keepalive-time: ${CUSTODY_DB_POOL_KEEPALIVE_MS:300000}
      # 7-3-7: 커넥션 유효성 검사 쿼리 (PostgreSQL)
      connection-test-query: SELECT 1
      # 7-3-8: 풀 이름 — Prometheus/JMX 지표에서 풀 식별
      pool-name: custody-hikari
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.flywaydb: INFO
    # 7-3-9: HikariCP 풀 상태 INFO 로깅 (운영 모니터링)
    com.zaxxer.hikari: INFO
    com.zaxxer.hikari.HikariConfig: DEBUG
