spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:custody}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

custody:
  security:
    api-keys:
      - key: ${CUSTODY_API_KEY_OPERATOR}
        roles: [OPERATOR]
      - key: ${CUSTODY_API_KEY_APPROVER}
        roles: [APPROVER, OPERATOR]
      - key: ${CUSTODY_API_KEY_ADMIN}
        roles: [ADMIN, APPROVER, OPERATOR]

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  structured:
    format:
      console: ecs
