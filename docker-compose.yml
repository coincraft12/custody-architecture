services:

  postgres:
    image: postgres:16-alpine
    container_name: custody-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-custody}
      POSTGRES_USER: ${DB_USERNAME:-custody}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-custody}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-custody} -d ${DB_NAME:-custody}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  custody:
    image: ghcr.io/${GITHUB_REPOSITORY:-coincraft12/custody-architecture}:${IMAGE_TAG:-latest}
    container_name: custody-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-custody}
      DB_USERNAME: ${DB_USERNAME:-custody}
      DB_PASSWORD: ${DB_PASSWORD:-custody}
      CUSTODY_CHAIN_MODE: ${CUSTODY_CHAIN_MODE:-evm}
      CUSTODY_EVM_RPC_URL: ${CUSTODY_EVM_RPC_URL}
      CUSTODY_EVM_CHAIN_ID: ${CUSTODY_EVM_CHAIN_ID:-11155111}
      CUSTODY_EVM_PRIVATE_KEY: ${CUSTODY_EVM_PRIVATE_KEY}
      CUSTODY_CONFIRMATION_TRACKER_AUTO_START: ${CUSTODY_CONFIRMATION_TRACKER_AUTO_START:-true}
      CUSTODY_WHITELIST_HOLD_HOURS: ${CUSTODY_WHITELIST_HOLD_HOURS:-48}
      CUSTODY_NONCE_EXPIRY_MINUTES: ${CUSTODY_NONCE_EXPIRY_MINUTES:-10}
      CUSTODY_API_KEY_OPERATOR: ${CUSTODY_API_KEY_OPERATOR}
      CUSTODY_API_KEY_APPROVER: ${CUSTODY_API_KEY_APPROVER}
      CUSTODY_API_KEY_ADMIN: ${CUSTODY_API_KEY_ADMIN}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: custody-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      custody:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    container_name: custody-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s:%(http_port)s/"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
